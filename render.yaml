services:
  - type: web
    name: docbot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: chatbot_rag
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: GEMINI_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: EMBEDDING_MODEL_NAME
        value: BAAI/bge-small-en-v1.5
      - key: SIMILARITY_THRESHOLD
        value: "0.5"
      - key: TOP_K
        value: "4"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        sync: false
